<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA Helper - 医疗器械分类初筛</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fbfbfd; }
        .apple-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900">

    <!-- 导航栏 -->
    <nav class="fixed w-full top-0 z-50 apple-blur bg-white/70 border-b border-gray-200/50">
        <div class="max-w-5xl mx-auto px-6 h-12 flex items-center justify-between">
            <span class="text-sm font-semibold tracking-tight">RA Navigator</span>
            <span class="text-xs text-gray-500">Regulatory Intelligence Tool</span>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="pt-32 pb-20 px-6">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-5xl md:text-6xl font-semibold tracking-tight mb-4">分类界定助手</h1>
            <p class="text-xl text-gray-500 mb-12">输入产品预期用途 (Intended Use)，快速获取法规参考。</p>

            <!-- 搜索框区域 -->
            <div class="relative max-w-2xl mx-auto mb-16">
                <input type="text" id="searchInput" 
                    placeholder="例如: Smart watch for heart rate monitoring..." 
                    class="w-full px-6 py-4 text-lg rounded-2xl border border-gray-300 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all duration-300 shadow-sm"
                >
                <button id="searchBtn" class="absolute right-3 top-2 bottom-2 px-6 bg-black text-white rounded-xl hover:bg-gray-800 transition-colors">
                    查询
                </button>
            </div>

            <!-- 结果显示区域 -->
            <div id="resultContainer" class="hidden text-left bg-white p-8 rounded-3xl border border-gray-100 shadow-xl fade-in">
                <div id="resultContent">
                    <!-- 结果会通过 JS 注入这里 -->
                </div>
            </div>

            <!-- 提示语 -->
            <div id="exclusionAlert" class="hidden p-6 bg-orange-50 border border-orange-100 rounded-3xl text-orange-800 text-left fade-in">
                <div class="flex items-start">
                    <span class="text-2xl mr-4">⚠️</span>
                    <div>
                        <h3 class="font-bold text-lg">初步评估结果：可能不属于医疗器械</h3>
                        <p class="mt-2 opacity-90">输入的关键词涉及康复、健身或美容。请进一步确认其是否具有医疗目的（治疗、诊断、减轻疾病等）。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');
        const exclusionAlert = document.getElementById('exclusionAlert');

        // 核心逻辑
        async function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            // 隐藏之前的搜索结果
            resultContainer.classList.add('hidden');
            exclusionAlert.classList.add('hidden');

            // 步骤一：排除项检查
            const exclusions = ['wellness', 'fitness', 'cosmetic', 'sport', 'beauty'];
            const isExclusion = exclusions.some(keyword => query.includes(keyword));

            if (isExclusion) {
                exclusionAlert.classList.remove('hidden');
                return;
            }

            // 步骤二：读取 JSON 数据
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('无法加载数据文件');
                const data = await response.json();

                // 在 Keyword_EN 字段中进行模糊匹配
                const match = data.find(item => 
                    item.Keyword_EN.toLowerCase().includes(query) || 
                    query.includes(item.Keyword_EN.toLowerCase())
                );

                if (match) {
                    showResult(match);
                } else {
                    resultContent.innerHTML = `
                        <p class="text-gray-500 italic text-center">未在数据库中找到直接匹配项，请尝试更换关键词。</p>
                    `;
                    resultContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                alert('数据加载失败，请确保目录下有 data.json 文件并在服务器环境下运行。');
            }
        }

        // 步骤三：美观地显示结果
        function showResult(item) {
            resultContent.innerHTML = `
                <div class="mb-6">
                    <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full uppercase tracking-wider">匹配结果</span>
                    <h2 class="text-3xl font-semibold mt-4 text-gray-900">${item.Keyword_EN}</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="p-4 bg-gray-50 rounded-2xl">
                        <p class="text-sm text-gray-400 mb-1">Classification 等级</p>
                        <p class="text-2xl font-bold text-blue-600">${item.Class || 'N/A'}</p>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-2xl">
                        <p class="text-sm text-gray-400 mb-1">Regulatory Basis 法规依据</p>
                        <p class="text-lg font-medium text-gray-800">${item.Rule || '暂无详细依据'}</p>
                    </div>
                </div>
                <div class="mt-8 pt-6 border-t border-gray-100">
                    <p class="text-xs text-gray-400">注意：此结果仅供参考，具体分类应以公告机构 (Notified Body) 或监管部门最终结论为准。</p>
                </div>
            `;
            resultContainer.classList.remove('hidden');
        }

        // 绑定事件
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
